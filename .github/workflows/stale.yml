name: Mark stale issues and PRs

on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: |
            This issue has been inactive for 30 days. It will be closed in 3 days unless there is new activity.
          stale-pr-message: |
            This PR has been inactive for 7 days. It will be closed in 3 days unless there is new activity.
          close-issue-message: "Closed due to inactivity."
          close-pr-message: "Closed due to inactivity."
          days-before-issue-stale: 30
          days-before-pr-stale: 7
          days-before-close: 3
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"

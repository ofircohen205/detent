name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on version tags like v0.1.0, v1.0.0, etc.

permissions:
  contents: read  # needed to checkout the repo

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install all dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run type checking
        run: uv run mypy detent/

      - name: Run Bandit (SAST)
        run: uv run bandit -r detent/ -ll -q

      - name: Export runtime requirements
        run: uv export --no-dev --no-hashes -o /tmp/requirements.txt

      - name: Run pip-audit (CVE scan)
        run: uv run pip-audit -r /tmp/requirements.txt

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Twine check
        run: uv run twine check dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: [build, preflight]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/detent/

    # OIDC trusted publishing — no API token needed.
    # Set up at: https://pypi.org/manage/project/detent/settings/publishing/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, preflight]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/detent/

    # OIDC trusted publishing for TestPyPI.
    # Set up at: https://test.pypi.org/manage/project/detent/settings/publishing/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.test.pypi.org/legacy/

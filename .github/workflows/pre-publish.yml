name: Pre-publish checks

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version:     $TAG"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag $TAG does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

  changelog-check:
    name: CHANGELOG entry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CHANGELOG has entry for this version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if ! grep -qF "## [$TAG]" CHANGELOG.md; then
            echo "ERROR: No CHANGELOG.md entry found for version $TAG"
            echo "Add a '## [$TAG]' section to CHANGELOG.md before releasing."
            exit 1
          fi
          echo "CHANGELOG entry found for $TAG"

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [version-check, changelog-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  twine-check:
    name: Twine metadata check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run twine check
        run: uv run twine check dist/*

  smoke-test:
    name: Clean-install smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from wheel (clean env, no dev deps)
        run: pip install dist/*.whl

      - name: Run import sanity check
        run: |
          python -c "
          import detent
          from detent.pipeline.pipeline import VerificationPipeline
          from detent.checkpoint.engine import CheckpointEngine
          from detent.schema import AgentAction
          from detent.config import DetentConfig
          print('Import sanity check: OK')
          "

  integrity-check:
    name: Wheel and sdist both present
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Assert both wheel and sdist exist
        run: |
          WHL=$(ls dist/*.whl 2>/dev/null | wc -l)
          SDIST=$(ls dist/*.tar.gz 2>/dev/null | wc -l)
          echo "Wheels: $WHL, sdists: $SDIST"
          if [ "$WHL" -lt 1 ] || [ "$SDIST" -lt 1 ]; then
            echo "ERROR: Expected both .whl and .tar.gz in dist/"
            ls dist/
            exit 1
          fi
          echo "Integrity check: OK"

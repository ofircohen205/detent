name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra security --dev

      - name: Run Bandit
        run: uv run bandit -r detent/ -ll -q

  pip-audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Export runtime requirements
        run: uv export --no-dev --no-hashes -o /tmp/requirements.txt

      - name: Run pip-audit
        run: uv run pip-audit -r /tmp/requirements.txt

  secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets drift
        run: |
          detect-secrets scan --baseline .secrets.baseline
          git diff --exit-code .secrets.baseline

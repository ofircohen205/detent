agent: claude-code
ipc_timeout_ms: 4000
log_level: INFO
pipeline:
  fail_fast: true
  parallel: true
  stages:
  - circuit_breaker:
      behavior: warn
      enabled: false
      failure_threshold: 5
      recovery_window_s: 60.0
    enabled: true
    name: syntax
    options: {}
    timeout: 30
    tools: []
  - circuit_breaker:
      behavior: warn
      enabled: false
      failure_threshold: 5
      recovery_window_s: 60.0
    enabled: true
    name: lint
    options: {}
    timeout: 30
    tools: []
  - circuit_breaker:
      behavior: warn
      enabled: false
      failure_threshold: 5
      recovery_window_s: 60.0
    enabled: true
    name: typecheck
    options: {}
    timeout: 30
    tools: []
  - circuit_breaker:
      behavior: warn
      enabled: false
      failure_threshold: 5
      recovery_window_s: 60.0
    enabled: true
    name: tests
    options: {}
    timeout: 60
    tools: []
  - circuit_breaker:
      behavior: warn
      enabled: false
      failure_threshold: 5
      recovery_window_s: 60.0
    enabled: true
    name: security
    options:
      bandit:
        confidence: low
        enabled: true
      semgrep:
        enabled: true
        rulesets:
        - p/python
        - p/owasp-top-ten
    timeout: 30
    tools: []
policy: standard
proxy:
  host: 127.0.0.1
  port: 7070
  upstream_url: null
strict_mode: false
telemetry:
  enabled: true
  exporter: console
  otlp_endpoint: http://localhost:4317
  service_name: detent
